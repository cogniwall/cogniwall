<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cw-grad" x1="64" y1="28" x2="448" y2="488" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <clipPath id="cw-shield">
      <path d="M256 28 L448 112 V276 C448 392 360 452 256 488 C152 452 64 392 64 276 V112 Z"/>
    </clipPath>
  </defs>

  <!-- Shield body -->
  <path d="M256 28 L448 112 V276 C448 392 360 452 256 488 C152 452 64 392 64 276 V112 Z"
        fill="url(#cw-grad)"/>

  <!-- Brick wall pattern (subtle mortar lines clipped to shield) -->
  <g clip-path="url(#cw-shield)" stroke="rgba(255,255,255,0.18)" stroke-width="2.5" fill="none">
    <!-- Horizontal mortar -->
    <line x1="30" y1="160" x2="482" y2="160"/>
    <line x1="30" y1="240" x2="482" y2="240"/>
    <line x1="30" y1="320" x2="482" y2="320"/>
    <line x1="30" y1="400" x2="482" y2="400"/>

    <!-- Vertical mortar — alternating offset rows -->
    <!-- Row 1 (top to 160) -->
    <line x1="176" y1="28" x2="176" y2="160"/>
    <line x1="336" y1="28" x2="336" y2="160"/>
    <!-- Row 2 (160 to 240) -->
    <line x1="128" y1="160" x2="128" y2="240"/>
    <line x1="256" y1="160" x2="256" y2="240"/>
    <line x1="384" y1="160" x2="384" y2="240"/>
    <!-- Row 3 (240 to 320) -->
    <line x1="176" y1="240" x2="176" y2="320"/>
    <line x1="336" y1="240" x2="336" y2="320"/>
    <!-- Row 4 (320 to 400) -->
    <line x1="160" y1="320" x2="160" y2="400"/>
    <line x1="256" y1="320" x2="256" y2="400"/>
    <line x1="352" y1="320" x2="352" y2="400"/>
    <!-- Row 5 (400 to bottom) -->
    <line x1="256" y1="400" x2="256" y2="500"/>
  </g>

  <!-- Neural network diamond -->
  <g clip-path="url(#cw-shield)">
    <!-- Connections -->
    <g stroke="rgba(255,255,255,0.45)" stroke-width="2" fill="none">
      <line x1="256" y1="160" x2="176" y2="240"/>
      <line x1="256" y1="160" x2="336" y2="240"/>
      <line x1="176" y1="240" x2="256" y2="320"/>
      <line x1="336" y1="240" x2="256" y2="320"/>
    </g>
    <!-- Nodes -->
    <circle cx="256" cy="160" r="10" fill="white" opacity="0.95"/>
    <circle cx="176" cy="240" r="7"  fill="white" opacity="0.85"/>
    <circle cx="336" cy="240" r="7"  fill="white" opacity="0.85"/>
    <circle cx="256" cy="320" r="8"  fill="white" opacity="0.9"/>
  </g>
</svg>
