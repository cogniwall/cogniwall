<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120">
  <defs>
    <linearGradient id="cwl-grad" x1="14" y1="6" x2="93" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <clipPath id="cwl-shield">
      <path d="M53 6 L93 24 V58 C93 82 76 94 53 102 C30 94 13 82 13 58 V24 Z"/>
    </clipPath>
  </defs>

  <!-- Shield icon -->
  <path d="M53 6 L93 24 V58 C93 82 76 94 53 102 C30 94 13 82 13 58 V24 Z"
        fill="url(#cwl-grad)"/>

  <!-- Simplified wall + diamond for small icon -->
  <g clip-path="url(#cwl-shield)" fill="none">
    <!-- Wall lines -->
    <g stroke="rgba(255,255,255,0.18)" stroke-width="0.8">
      <line x1="5" y1="34" x2="100" y2="34"/>
      <line x1="5" y1="51" x2="100" y2="51"/>
      <line x1="5" y1="68" x2="100" y2="68"/>
      <line x1="5" y1="85" x2="100" y2="85"/>
      <!-- Verticals row 1 -->
      <line x1="36" y1="6"  x2="36" y2="34"/>
      <line x1="70" y1="6"  x2="70" y2="34"/>
      <!-- Verticals row 2 -->
      <line x1="27" y1="34" x2="27" y2="51"/>
      <line x1="53" y1="34" x2="53" y2="51"/>
      <line x1="79" y1="34" x2="79" y2="51"/>
      <!-- Verticals row 3 -->
      <line x1="36" y1="51" x2="36" y2="68"/>
      <line x1="70" y1="51" x2="70" y2="68"/>
      <!-- Verticals row 4 -->
      <line x1="33" y1="68" x2="33" y2="85"/>
      <line x1="53" y1="68" x2="53" y2="85"/>
      <line x1="73" y1="68" x2="73" y2="85"/>
      <!-- Verticals row 5 -->
      <line x1="53" y1="85" x2="53" y2="102"/>
    </g>
    <!-- Neural diamond -->
    <g stroke="rgba(255,255,255,0.4)" stroke-width="0.8">
      <line x1="53" y1="34" x2="36" y2="51"/>
      <line x1="53" y1="34" x2="70" y2="51"/>
      <line x1="36" y1="51" x2="53" y2="68"/>
      <line x1="70" y1="51" x2="53" y2="68"/>
    </g>
  </g>
  <!-- Neural nodes -->
  <circle cx="53" cy="34" r="2.2" fill="white" opacity="0.95"/>
  <circle cx="36" cy="51" r="1.6" fill="white" opacity="0.85"/>
  <circle cx="70" cy="51" r="1.6" fill="white" opacity="0.85"/>
  <circle cx="53" cy="68" r="1.8" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="118" y="73"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="46" font-weight="600" letter-spacing="-0.5" fill="#1E1B4B">CogniWall</text>
</svg>
