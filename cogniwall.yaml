# CogniWall example configuration
# Copy this file and customize for your project.

version: "1"

# How to handle errors from LLM-based rules:
#   "error"   - return error verdict (default, developer handles it)
#   "block"   - treat errors as blocks (fail-closed, recommended for production)
#   "approve" - treat errors as approvals (fail-open)
on_error: error

rules:
  # Block payloads containing PII
  - type: pii_detection
    block: [ssn, credit_card]
    # custom_terms: ["Project Titan", "internal-api-key"]

  # Block financial amounts over threshold
  - type: financial_limit
    field: amount
    max: 100

  # Block unwanted tone in AI-generated content
  # Requires: pip install cogniwall[anthropic], cogniwall[openai], or cogniwall[gemini]
  # - type: tone_sentiment
  #   field: body
  #   block: [angry, sarcastic, apologetic]
  #   custom: ["sounds legally liable"]
  #   provider: anthropic
  #   model: claude-haiku-4-5-20251001
  #   api_key_env: ANTHROPIC_API_KEY

  # Rate limit actions per user/agent
  # - type: rate_limit
  #   max_actions: 5
  #   window_seconds: 3600
  #   key_field: user_id

  # Detect prompt injection attacks
  # Requires: pip install cogniwall[anthropic], cogniwall[openai], or cogniwall[gemini]
  # - type: prompt_injection
  #   provider: anthropic
  #   model: claude-haiku-4-5-20251001
  #   api_key_env: ANTHROPIC_API_KEY

  # --- Provider examples ---
  # OpenAI:
  #   provider: openai
  #   model: gpt-4o-mini
  #   api_key_env: OPENAI_API_KEY
  #
  # Gemini:
  #   provider: gemini
  #   model: gemini-2.0-flash
  #   api_key_env: GEMINI_API_KEY
  #
  # Local LLM (OpenClaw, Ollama, LM Studio, vLLM):
  #   provider: openai
  #   base_url: http://127.0.0.1:11434/v1
  #   model: llama3

